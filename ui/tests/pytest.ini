[pytest]
# Pytest configuration for qc-studio UI tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = -ra --tb=short

# Markers
markers =
    unit: unit test
    integration: integration test
    slow: slow running test

# Test paths
testpaths = .

# Coverage options (when using with --cov)
[coverage:run]
source = ui
omit = 
    */tests/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
